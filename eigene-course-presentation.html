<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Eigene Course Presentation</title><style>body{margin:0;font-family:Inter,system-ui,sans-serif;color:#111827;background:#fff;padding:32px}.shell{max-width:1100px;margin:0 auto}.top{border:1.3px solid rgba(17,24,39,.7);padding:28px 32px;margin-bottom:24px;box-shadow:8px 16px 28px rgba(17,24,39,.08)}h1{font-size:clamp(2rem,4vw,4rem);line-height:1;margin:0 0 12px;letter-spacing:-.04em}.eyebrow{font-size:.78rem;text-transform:uppercase;letter-spacing:.14em;color:#5f6876;font-weight:850}.viewer-card{border:1.3px solid rgba(17,24,39,.7);padding:30px;margin:18px 0;box-shadow:8px 16px 28px rgba(17,24,39,.08);background:#fff}.nav{display:flex;gap:10px;align-items:center;margin-top:16px}.nav button,.iv-answer-button,.iv-primary-button{border:1px solid rgba(47,95,143,.35);background:#e8f2fb;color:#173d63;font-weight:800;padding:11px 15px;cursor:pointer}.lite-media{max-width:100%;max-height:360px;display:block;margin:18px 0;border:1px solid rgba(17,24,39,.18)}.lite-video{width:100%;max-height:520px;background:#111}.h5p-lite-answer-stack{display:grid;gap:10px;margin-top:18px}.iv-answer-button{background:#fff;text-align:left}.iv-answer-button.is-correct{background:#dcfce7;border-color:#166534}.iv-answer-button.is-wrong{background:#fee2e2;border-color:#991b1b}.iv-feedback{margin-top:16px;padding:14px;border:1px solid rgba(47,95,143,.3);background:#e8f2fb}.dtw-blank{display:inline-flex;min-width:110px;min-height:32px;margin:0 4px;padding:4px 8px;border:1.4px dashed rgba(47,95,143,.75);background:#e8f2fb;vertical-align:middle;font-weight:800}.dtw-blank.is-correct,.dnd-item.is-correct{background:#dcfce7}.dtw-word-bank,.dnd-bank{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0}.dtw-chip,.dnd-item{border:1px solid rgba(17,24,39,.34);background:#fff;padding:10px 14px;border-radius:999px;font-weight:760;cursor:grab}.dnd-target-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin:22px 0}.dnd-target{min-height:140px;padding:14px;border:1.4px dashed rgba(47,95,143,.65);background:rgba(232,242,251,.46)}.lite-iv-stage{position:relative}.lite-glass-overlay{position:absolute;left:6%;right:6%;bottom:8%;padding:22px;background:rgba(255,255,255,.72);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.55);box-shadow:0 18px 40px rgba(17,24,39,.20)}</style></head><body><main class="shell"><section class="top"><p class="eyebrow">Exportierte Aktivität</p><h1>Eigene Course Presentation</h1><p>Diese Datei wurde aus dem Kursrahmen-Editor als eigenständige HTML-Datei exportiert.</p></section><div id="viewer"></div><div class="nav"><button id="prev">Zurück</button><span id="count"></span><button id="next">Weiter</button></div></main><script>const DATA={"title":"Eigene Course Presentation","slides":[{"id":"7c6efa4f-4f22-451d-abbe-79dd0eac19b1","type":"text","title":"Folie 1","text":"Hier steht dein Inhalt.","media":"","question":"Welche Antwort passt?","description":"Wähle eine Antwort aus.","answers":["Antwort 1","Antwort 2","Antwort 3"],"correctIndex":0,"dragText":"Eine professionelle Gesprächsführung braucht [Wartezeit] und [Rückmeldung].","pairs":[{"item":"Wartezeit","target":"Gesprächsführung"},{"item":"Tafelbild","target":"Sicherung"}],"interactions":[{"id":"332331ec-d23e-422a-942d-8a9753812e2a","time":4,"question":"Was ist hier wichtig?","description":"Wähle eine Antwort aus.","answers":["Genau beobachten","Überspringen"],"correctIndex":0,"pause":true}]},{"id":"39afcbb8-aff8-481c-b22b-4ba59769a70d","type":"dragDrop","title":"Übungsfolie","text":"Hier steht dein Inhalt.","media":"","question":"Welche Antwort passt?","description":"Wähle eine Antwort aus.","answers":["Antwort 1","Antwort 2","Antwort 3"],"correctIndex":0,"dragText":"Eine professionelle Gesprächsführung braucht [Wartezeit] und [Rückmeldung].","pairs":[{"item":"Wartezeit","target":"Gesprächsführung"},{"item":"Tafelbild","target":"Sicherung"}],"interactions":[{"id":"738d6d0b-77a5-4d63-83da-216bd6a578e7","time":4,"question":"Was ist hier wichtig?","description":"Wähle eine Antwort aus.","answers":["Genau beobachten","Überspringen"],"correctIndex":0,"pause":true}]},{"id":"aea8e039-7fbe-44a1-a7c7-23c8422d1c75","type":"multipleChoice","title":"Folie 3","text":"Hier steht dein Inhalt.","media":"https://www.youtube.com/watch?v=tCDvOQI3pco","question":"Welche Antwort passt?","description":"Wähle eine Antwort aus.","answers":["Antwort 1","Antwort 2","Antwort 3"],"correctIndex":0,"dragText":"Eine professionelle Gesprächsführung braucht [Wartezeit] und [Rückmeldung].","pairs":[{"item":"Wartezeit","target":"Gesprächsführung"},{"item":"Tafelbild","target":"Sicherung"}],"interactions":[{"id":"4bdc1d96-f208-4a12-84b5-8cc5c22f6e45","time":4,"question":"Was ist hier wichtig?","description":"Wähle eine Antwort aus.","answers":["Genau beobachten","Überspringen"],"correctIndex":0,"pause":true}]},{"id":"1a6b756f-7d90-4e1f-9312-b4a6fff4c31f","type":"text","title":"Folie 4","text":"Hier steht dein Inhalt.","media":"","question":"Welche Antwort passt?","description":"Wähle eine Antwort aus.","answers":["Antwort 1","Antwort 2","Antwort 3"],"correctIndex":0,"dragText":"Eine professionelle Gesprächsführung braucht [Wartezeit] und [Rückmeldung].","pairs":[{"item":"Wartezeit","target":"Gesprächsführung"},{"item":"Tafelbild","target":"Sicherung"}],"interactions":[{"time":4,"question":"Was ist hier wichtig?","description":"Wähle eine Antwort aus.","answers":["Genau beobachten","Überspringen"],"correctIndex":0,"pause":true}]}]};const KIND="course-presentation";const uid=()=>String(Date.now()+Math.random());(value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]))
function renderMultipleChoice(data, mode = "preview") {
    const answers = Array.isArray(data.answers) && data.answers.length ? data.answers : ["Antwort 1"];
    return `<article class="h5p-lite-question-preview lite-content-block" data-lite-type="mc"><h2>${escapeHtml(data.question || data.title || "Frage")}</h2><p>${escapeHtml(data.description || data.text || "")}</p><div class="h5p-lite-answer-stack">${answers.map((a,i)=>`<button class="iv-answer-button" type="button" data-correct="${i === Number(data.correctIndex)}">${escapeHtml(a)}</button>`).join("")}</div><div class="iv-feedback" hidden></div></article>`;
  }
function renderDragWords(data, mode = "preview") {
    const words = [];
    const source = data.dragText || data.text || "Text mit [Lücke].";
    const html = escapeHtml(source).replace(/\[([^\]]+)\]/g, (_, w) => { words.push(w); return `<span class="dtw-blank" data-answer="${escapeHtml(w)}"></span>`; });
    const shuffled = [...words].sort(() => Math.random() - 0.5);
    return `<article class="h5p-lite-question-preview lite-content-block" data-lite-type="dtw"><h2>${escapeHtml(data.title || "Drag the Words")}</h2><p class="dtw-text">${html}</p><div class="dtw-word-bank">${shuffled.map(w=>`<button class="dtw-chip" type="button" draggable="true">${escapeHtml(w)}</button>`).join("")}</div><button class="iv-primary-button lite-check-dtw" type="button">Prüfen</button><div class="iv-feedback" hidden></div></article>`;
  }
function renderDragDrop(data, mode = "preview") {
    const pairs = Array.isArray(data.pairs) && data.pairs.length ? data.pairs : [{ item: "Begriff", target: "Ziel" }];
    const targets = [...new Set(pairs.map(p => p.target))];
    const items = [...pairs].sort(() => Math.random() - 0.5);
    return `<article class="h5p-lite-question-preview lite-content-block" data-lite-type="dnd"><h2>${escapeHtml(data.title || "Drag and Drop")}</h2><p>${escapeHtml(data.instructions || data.description || "Ziehe die Begriffe in die passenden Felder.")}</p><div class="dnd-bank">${items.map(p=>`<button class="dnd-item" type="button" draggable="true" data-target="${escapeHtml(p.target)}">${escapeHtml(p.item)}</button>`).join("")}</div><div class="dnd-target-grid">${targets.map(t=>`<div class="dnd-target" data-target="${escapeHtml(t)}"><strong>${escapeHtml(t)}</strong></div>`).join("")}</div><button class="iv-primary-button lite-check-dnd" type="button">Prüfen</button><div class="iv-feedback" hidden></div></article>`;
  }
function normalizeBlock(block, fallbackTitle = "Inhalt") {
    const base = defaultBlock(block?.type || "text", block?.title || fallbackTitle);
    const merged = { ...base, ...(block || {}) };
    merged.answers = Array.isArray(merged.answers) && merged.answers.length ? merged.answers.map(String) : base.answers;
    merged.correctIndex = Math.min(Math.max(0, Number(merged.correctIndex) || 0), Math.max(0, merged.answers.length - 1));
    merged.pairs = Array.isArray(merged.pairs) ? merged.pairs.filter(p => p && p.item && p.target).map(p => ({ item: String(p.item), target: String(p.target) })) : base.pairs;
    merged.interactions = Array.isArray(merged.interactions) ? merged.interactions.map(normalizeInteraction) : base.interactions;
    return merged;
  }
function normalizeInteraction(item) {
    return {
      id: item?.id || uid(),
      time: Number(item?.time) || 0,
      question: String(item?.question || "Frage"),
      description: String(item?.description || "Wähle eine Antwort aus."),
      answers: Array.isArray(item?.answers) && item.answers.length ? item.answers.map(String) : ["Antwort 1"],
      correctIndex: Math.max(0, Number(item?.correctIndex) || 0),
      pause: item?.pause !== false
    };
  }
(type = "text", title = "Neuer Inhalt") => ({
    id: uid(),
    type,
    title,
    text: "Hier steht dein Inhalt.",
    media: "",
    question: "Welche Antwort passt?",
    description: "Wähle eine Antwort aus.",
    answers: ["Antwort 1", "Antwort 2", "Antwort 3"],
    correctIndex: 0,
    dragText: "Eine professionelle Gesprächsführung braucht [Wartezeit] und [Rückmeldung].",
    pairs: [
      { item: "Wartezeit", target: "Gesprächsführung" },
      { item: "Tafelbild", target: "Sicherung" }
    ],
    interactions: [
      { time: 4, question: "Was ist hier wichtig?", description: "Wähle eine Antwort aus.", answers: ["Genau beobachten", "Überspringen"], correctIndex: 0, pause: true }
    ]
  })
function renderActivityBlock(block, mode = "preview") {
    const b = normalizeBlock(block);
    const media = b.media ? b.media.trim() : "";
    if (b.type === "imageText") {
      return `<article class="lite-content-block"><h2>${escapeHtml(b.title)}</h2>${media ? `<img class="lite-media" src="${escapeHtml(media)}" alt="" />` : ""}<p>${escapeHtml(b.text)}</p></article>`;
    }
    if (b.type === "video") {
      return `<article class="lite-content-block"><h2>${escapeHtml(b.title)}</h2><p>${escapeHtml(b.text)}</p>${media ? `<video class="lite-video" src="${escapeHtml(media)}" controls></video>` : `<p class="lite-note">Noch keine Video-URL eingetragen.</p>`}</article>`;
    }
    if (b.type === "interactiveVideo") {
      return `<article class="lite-content-block lite-iv-block"><h2>${escapeHtml(b.title)}</h2><p>${escapeHtml(b.text)}</p>${media ? `<div class="lite-iv-stage"><video class="lite-video" src="${escapeHtml(media)}" controls></video><div class="lite-glass-overlay" hidden></div></div>` : `<p class="lite-note">Noch keine Video-URL eingetragen.</p>`}<p class="lite-note">${b.interactions.length} Interaktion(en) angelegt.</p></article>`;
    }
    if (b.type === "multipleChoice") {
      return renderMultipleChoice(b, mode);
    }
    if (b.type === "dragWords") {
      return renderDragWords(b, mode);
    }
    if (b.type === "dragDrop") {
      return renderDragDrop(b, mode);
    }
    return `<article class="lite-content-block"><h2>${escapeHtml(b.title)}</h2><p>${escapeHtml(b.text)}</p></article>`;
  }
function attachPreviewInteractions(root = document) {
    root.querySelectorAll('[data-lite-type="mc"]').forEach(card => {
      const feedback = card.querySelector(".iv-feedback");
      card.querySelectorAll(".iv-answer-button").forEach(btn => btn.onclick = () => {
        const buttons = [...card.querySelectorAll(".iv-answer-button")];
        buttons.forEach(b => { b.disabled = true; if (b.dataset.correct === "true") b.classList.add("is-correct"); });
        if (btn.dataset.correct !== "true") btn.classList.add("is-wrong");
        if (feedback) { feedback.hidden = false; feedback.textContent = btn.dataset.correct === "true" ? "Richtig." : "Nicht ganz. Die richtige Antwort ist markiert."; }
      });
    });
    let dragged = null;
    root.querySelectorAll(".dtw-chip,.dnd-item").forEach(chip => {
      chip.addEventListener("dragstart", () => dragged = chip);
      chip.addEventListener("click", () => dragged = chip);
    });
    root.querySelectorAll(".dtw-blank").forEach(blank => {
      const place = () => { if (dragged && dragged.classList.contains("dtw-chip")) { blank.textContent = dragged.textContent; blank.dataset.filled = dragged.textContent; dragged.remove(); dragged = null; } };
      blank.addEventListener("dragover", e => e.preventDefault()); blank.addEventListener("drop", place); blank.addEventListener("click", place);
    });
    root.querySelectorAll(".dnd-target").forEach(zone => {
      const place = () => { if (dragged && dragged.classList.contains("dnd-item")) { zone.appendChild(dragged); dragged = null; } };
      zone.addEventListener("dragover", e => e.preventDefault()); zone.addEventListener("drop", place); zone.addEventListener("click", place);
    });
    root.querySelectorAll(".lite-check-dtw").forEach(btn => btn.onclick = () => {
      const card = btn.closest('[data-lite-type="dtw"]'); const blanks = [...card.querySelectorAll(".dtw-blank")]; const feedback = card.querySelector(".iv-feedback");
      const ok = blanks.length && blanks.every(b => b.dataset.filled === b.dataset.answer); blanks.forEach(b => b.classList.toggle("is-correct", b.dataset.filled === b.dataset.answer));
      if (feedback) { feedback.hidden = false; feedback.textContent = ok ? "Alles richtig." : "Noch nicht alles richtig."; }
    });
    root.querySelectorAll(".lite-check-dnd").forEach(btn => btn.onclick = () => {
      const card = btn.closest('[data-lite-type="dnd"]'); const items = [...card.querySelectorAll(".dnd-target .dnd-item")]; const feedback = card.querySelector(".iv-feedback");
      const all = card.querySelectorAll(".dnd-item").length; const ok = items.length === all && items.every(i => i.dataset.target === i.parentElement.dataset.target);
      items.forEach(i => i.classList.toggle("is-correct", i.dataset.target === i.parentElement.dataset.target));
      if (feedback) { feedback.hidden = false; feedback.textContent = ok ? "Alles richtig." : "Einige Zuordnungen stimmen noch nicht."; }
    });
    root.querySelectorAll(".lite-iv-stage video").forEach(video => {
      const dataAttr = video.closest(".lite-iv-stage")?.dataset.interactions;
      if (!dataAttr) return;
      let interactions = [];
      try { interactions = JSON.parse(dataAttr); } catch (_e) {}
      const overlay = video.closest(".lite-iv-stage").querySelector(".lite-glass-overlay");
      video.addEventListener("timeupdate", () => {
        const item = interactions.find(x => !x.done && video.currentTime >= Number(x.time) && video.currentTime <= Number(x.time) + 0.5);
        if (!item || !overlay) return;
        item.done = true; if (item.pause !== false) video.pause();
        overlay.hidden = false;
        overlay.innerHTML = `<h3>${escapeHtml(item.question)}</h3><p>${escapeHtml(item.description || "")}</p><div class="h5p-lite-answer-stack">${item.answers.map((a,i)=>`<button class="iv-answer-button" type="button" data-index="${i}">${escapeHtml(a)}</button>`).join("")}</div>`;
        overlay.querySelectorAll("button").forEach(btn => btn.onclick = () => { overlay.hidden = true; video.play().catch(()=>{}); });
      });
    });
  }
(function(){let active=0;function render(){if(KIND==='course-presentation'){const s=DATA.slides[active];document.getElementById('viewer').innerHTML='<section class="viewer-card"><p class="eyebrow">'+escapeHtml(DATA.title)+'</p>'+renderActivityBlock(s,'export')+'</section>';document.getElementById('count').textContent='Folie '+(active+1)+' von '+DATA.slides.length;attachPreviewInteractions(document.getElementById('viewer'));}if(KIND==='interactive-book'){document.getElementById('bookNav').innerHTML=DATA.pages.map((p,i)=>'<button data-i="'+i+'">'+escapeHtml(p.title||('Seite '+(i+1)))+'</button>').join('');document.getElementById('bookNav').querySelectorAll('button').forEach(b=>b.onclick=()=>{active=Number(b.dataset.i);render();});document.getElementById('viewer').innerHTML='<section class="viewer-card"><p class="eyebrow">'+escapeHtml(DATA.title)+'</p>'+renderActivityBlock(DATA.pages[active],'export')+'</section>';attachPreviewInteractions(document.getElementById('viewer'));}}document.getElementById('prev')?.addEventListener('click',()=>{active=Math.max(0,active-1);render();});document.getElementById('next')?.addEventListener('click',()=>{active=Math.min(DATA.slides.length-1,active+1);render();});if(KIND==='course-presentation'||KIND==='interactive-book')render();else attachPreviewInteractions(document);})();</script></body></html>
