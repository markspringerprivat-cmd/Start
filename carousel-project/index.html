<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kachelrad</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="carousel" aria-label="Themen-Karussell">
      <button class="arrow arrow-left" id="prevBtn" aria-label="Vorheriges Thema">
        &#10094;
      </button>

      <div class="tiles" id="tiles">
        <article class="tile tile-side" id="leftTile"></article>
        <article class="tile tile-active" id="centerTile"></article>
        <article class="tile tile-side" id="rightTile"></article>
      </div>

      <button class="arrow arrow-right" id="nextBtn" aria-label="Nächstes Thema">
        &#10095;
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
