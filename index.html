<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lineares Themenlayout</title>
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <main class="page-shell">
    <section class="topic-navigation" aria-label="Themen-Navigation">
      <button class="arrow-button arrow-left" id="prevBtn" type="button" aria-label="Vorheriges Thema">
        <span aria-hidden="true">&#10094;</span>
      </button>

      <div class="slider-window">
        <div class="cards-track" id="cardsTrack"></div>
      </div>

      <button class="arrow-button arrow-right" id="nextBtn" type="button" aria-label="Nächstes Thema">
        <span aria-hidden="true">&#10095;</span>
      </button>
    </section>

    <div class="horizontal-divider" aria-hidden="true"></div>

    <section class="dynamic-content" id="dynamicContent" aria-live="polite">
      <section class="hero-banner" aria-label="Banner">
        <div class="banner-pattern"></div>
        <div class="banner-content">
          <p class="banner-kicker" id="bannerKicker">Modul</p>
          <h1 id="bannerTitle">Dekomposition</h1>
          <p id="bannerSubtitle">Komplexe Aufgaben in kleinere, überschaubare Teilprobleme zerlegen.</p>
        </div>
      </section>

      <section class="content-area" aria-label="Inhalt zum aktiven Thema">
        <article class="text-column">
          <h2 id="leftTitle">Was bedeutet Dekomposition?</h2>
          <div id="leftText"></div>
        </article>

        <div class="vertical-divider" aria-hidden="true"></div>

        <article class="text-column learning-column">
          <h2 id="rightTitle">Was lernst du in diesem Modul?</h2>
          <div id="rightText"></div>
        </article>
      </section>
    </section>
  </main>

  <script src="script.js?v=7"></script>
</body>
</html>
